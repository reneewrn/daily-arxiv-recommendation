<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Daily ArXiv{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between sticky top-0 z-10 shadow-sm">
    <a href="/" class="text-xl font-semibold tracking-tight text-indigo-600">Daily ArXiv</a>
    <div class="flex items-center gap-3">
      <a href="/settings" class="text-sm text-gray-600 hover:text-indigo-600 transition">Settings</a>
      <form method="post" action="/fetch">
        <button type="submit"
          class="text-sm bg-indigo-600 text-white px-3 py-1.5 rounded-md hover:bg-indigo-700 transition">
          Fetch Now
        </button>
      </form>
    </div>
  </nav>

  <!-- Main content -->
  <main class="max-w-4xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
